<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mianContainer">
        <header>
            <div id="logo">
                <img src="./assets/logo.png" alt="">
                <h1>ScaleX</h1>   
            </div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Blogs</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
            <button>Get Started</button>
        </header>

        <main>
            <div class="heroTitle">
                <h1>Insights & Blogs</h1>
            </div>
            <div class="filters">
                <span>All</span>
                <span>Tech</span>
                <span>SaaS</span>
                <span>Marketing</span>
            </div>
            <div class="cards">
                <div class="card">
                    <img src="./assets/glass.png" alt="">
                    <div class="cardInfo">
                        <div class="tag">Tech</div>
                        <div class="cardTitle">The Ultimate Guide To SaaS Marketing</div>
                        <div class="date">May 23, 2025</div>
                    </div>
                </div>
                <div class="card">
                    <img src="./assets/chair.png" alt="">
                    <div class="cardInfo">
                        <div class="tag">SaaS</div>
                        <div class="cardTitle">5 Key Trends In SaaS Growth For 2025</div>
                        <div class="date">May 23, 2025</div>
                    </div>
                </div>
                <div class="card">
                    <img src="./assets/cat.png" alt="">
                    <div class="cardInfo">
                        <div class="tag">Marketing</div>
                        <div class="cardTitle">How Data-Driven Strategies Are Important</div>
                        <div class="date">May 23, 2025</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
