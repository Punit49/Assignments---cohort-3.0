<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squid Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>
<body>
    <div class="mainContainer">
        <header>
            <div id="logo">
                <img src="./ASSETS/LOGO.png" alt="Logo">
            </div>
            <ul>
                <li><a href="#">About</a></li>
                <li><a href="#">Watch Now</a></li>
                <li><a href="#">Actors</a></li>
                <li><a href="#">Contact</a></li>
            </ul>

            <div class="menuBar"> 
                <i class="ri-menu-3-fill"></i>
            </div>
        </header>

        <main>
            <section id="heroSection">
                <div id="heroLeft">
                    <img src="./ASSETS/./squid.png" alt="">
                    <p>Action / Thriller / Drama Series directed by Dong-hyuk Hwang Season 1: 9 Episodes</p>
                    <div class="btns">
                        <button class="heroBtns">
                            <span class="playBtn "><i class="ri-play-large-fill"></i></span>
                            <span>Play Now</span>
                        </button>
                        <button class="heroBtns">
                            <i class="ri-play-line"></i>
                            <span>Watch Tariler</span>
                        </button>
                    </div>
                </div>

                <span id="scrollTag">SCROLL</span> 

                <div id="heroRight">
                    <img src="./ASSETS/HERO.png" id="heroImg" alt="">
                </div>
            </section>

            <section id="cards">
                <img src="./ASSETS/cardimg1.png" alt="Card">
                <img src="./ASSETS/Gemini_Generated_Image_l5ctsxl5ctsxl5ct.png" alt="Card">
                <img src="./ASSETS/cardim3.png" alt="Card">
            </section>

            <!-- Text Overlay -->
            <h1 id="squidText">
               SQUID
            </h1>
        </main>
    </div>
</body>
</html>
